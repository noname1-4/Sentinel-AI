name: Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  PYTHON_IMAGE: ghcr.io/noname1-4/sentinel-ai-python
  UI_IMAGE: ghcr.io/noname1-4/sentinel-ai-ui

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Python runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: python-runtime
          push: true
          tags: |
            ${{ env.PYTHON_IMAGE }}:latest
            ${{ env.PYTHON_IMAGE }}:${{ github.sha }}

      - name: Build and push UI runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ui-runtime
          push: true
          tags: |
            ${{ env.UI_IMAGE }}:latest
            ${{ env.UI_IMAGE }}:${{ github.sha }}
