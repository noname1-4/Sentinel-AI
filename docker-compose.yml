name: sentinel-ai-v2

x-sentinel-python-service: &sentinel-python-service
  image: sentinel-ai-v2-python:latest
  build:
    context: .
    dockerfile: Dockerfile
    target: python-runtime
  env_file:
    - .env
  environment:
    SENTINEL_CONFIG: /app/config.yaml
    PYTHONUNBUFFERED: "1"
  volumes:
    - type: bind
      source: ./config.yaml
      target: /app/config.yaml
      read_only: true
    - type: bind
      source: ./data
      target: /app/data
    - type: bind
      source: ./logs
      target: /app/logs
  networks:
    - sentinel-net
  restart: unless-stopped

services:
  sentinel-bot:
    <<: *sentinel-python-service
    container_name: sentinel-bot
    command: ["macro-sentinel", "--config", "/app/config.yaml", "--loop"]

  sentinel-api:
    <<: *sentinel-python-service
    container_name: sentinel-api
    command: ["uvicorn", "macro_sentinel.api:app", "--host", "0.0.0.0", "--port", "8000"]
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  sentinel-ui:
    image: sentinel-ai-v2-ui:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: ui-runtime
    container_name: sentinel-ui
    depends_on:
      sentinel-api:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - sentinel-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  sentinel-net:
    driver: bridge
